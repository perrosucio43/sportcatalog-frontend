  <!-- Script para animaciones de transición de hojas -->
  <script>
      document.addEventListener('DOMContentLoaded', () => {
          const transitionScreen = document.getElementById('page-transition');
          const leaves = document.querySelectorAll('.transition-leaf');

          // Función para actualizar el color de las hojas según la categoría
          function updateLeafColors(category) {
              // Resetear todas las clases primero
              leaves.forEach(leaf => {
                  leaf.classList.remove('leaf-verde', 'leaf-naranja', 'leaf-rojo', 'leaf-amarillo');
              });

              // Asignar colores según categoría
              if (category === 'calza-larga' || category === 'calzas-largas' || category === 'calza larga') {
                  document.querySelector('.leaf-verde')?.classList.add('leaf-verde');
                  document.querySelector('.leaf-amarillo')?.classList.add('leaf-amarillo');
              } else if (category === 'calza-corta' || category === 'calzas-cortas' || category === 'calza corta') {
                  document.querySelector('.leaf-naranja')?.classList.add('leaf-naranja');
                  document.querySelector('.leaf-amarillo')?.classList.add('leaf-amarillo');
              } else if (category === 'remera' || category === 'remeras') {
                  document.querySelector('.leaf-rojo')?.classList.add('leaf-rojo');
                  document.querySelector('.leaf-amarillo')?.classList.add('leaf-amarillo');
              } else if (category === 'combo' || category === 'combos') {
                  document.querySelector('.leaf-rojo')?.classList.add('leaf-rojo');
                  document.querySelector('.leaf-naranja')?.classList.add('leaf-naranja');
              }
              // Default: colores mixtos (otoño)
          }

          // Inicializar con colores mixtos (verano otoño)
          updateLeafColors('mixed');

          // Función para activar transición con animación suave
          function activateTransition(enteringCategory) {
              if (!transitionScreen) return;

              // Mostrar overlay con fade-in
              transitionScreen.classList.add('active');

              // Esperar a que termine la animación de entrada
              setTimeout(() => {
                  // Ocultar transición
                  transitionScreen.classList.remove('active');
              }, 800);
          }

          // Exponer funciones para usar en otras páginas
          window.activateTransition = activateTransition;
          window.updateLeafColors = updateLeafColors;
      });
  </script>
